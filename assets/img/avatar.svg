<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a4a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Gradient background -->
  <rect width="400" height="400" fill="url(#grad1)"/>
  
  <!-- Circular border -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#00d4ff" stroke-width="4"/>
  
  <!-- Inner circle accent -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#0088aa" stroke-width="1" opacity="0.5"/>
  
  <!-- Text "V0X" -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="140" font-weight="bold" 
        fill="white" text-anchor="middle" dominant-baseline="middle">V0X</text>
  
  <!-- Security icon accent - small lock symbol -->
  <g transform="translate(280, 80)">
    <!-- Lock shape -->
    <rect x="8" y="16" width="24" height="20" rx="2" fill="none" stroke="#00ff88" stroke-width="2"/>
    <path d="M 12 16 V 10 A 8 8 0 0 1 28 10 V 16" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="24" r="2" fill="#00ff88"/>
  </g>
</svg>